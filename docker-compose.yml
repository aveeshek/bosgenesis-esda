services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: esda
      POSTGRES_PASSWORD: esda
      POSTGRES_DB: esda
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esda -d esda"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esda-local

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esda-local

  redis:
    image: redis:7
    profiles: ["optional"]
    ports:
      - "6379:6379"
    networks:
      - esda-local

volumes:
  postgres-data:
  qdrant-data:

networks:
  esda-local:
    driver: bridge