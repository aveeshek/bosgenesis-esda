<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BOS Genesis ESDA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
  </head>
  <body>
    {% block body %}{% endblock %}
    <div class="modal fade" id="llm-chat-modal" tabindex="-1" aria-labelledby="llm-chat-title" aria-hidden="true">
      <div class="modal-dialog modal-dialog-scrollable modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-6" id="llm-chat-title">LLM Chat</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="llm-chat-status" class="small text-secondary mb-2">Ready</div>
            <div id="llm-chat-messages" class="llm-chat-messages" aria-live="polite"></div>
          </div>
          <div class="modal-footer llm-chat-input-row">
            <textarea id="llm-chat-input" class="form-control" rows="2" placeholder="Ask the LLM a question"></textarea>
            <button id="llm-chat-send" class="btn btn-primary" type="button">Send</button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/llm_chat.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
