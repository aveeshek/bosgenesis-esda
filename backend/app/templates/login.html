{% extends "base.html" %}

{% block body %}
<main class="login-shell">
  <section class="login-panel">
    <h1>Ericsson Autonomous SRE and DevOps Agent</h1>
    <p class="text-secondary">Sign in to run bounded autonomous operations.</p>
    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" id="password" type="password" name="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Log in</button>
    </form>
  </section>
</main>
{% endblock %}
